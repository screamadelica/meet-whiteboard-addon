<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Canvas Controller</title>
    
    <!-- Excalidraw Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>window.process = { env: { NODE_ENV: 'production' } };</script>
    <script src="https://unpkg.com/@excalidraw/excalidraw/dist/excalidraw.production.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f0f2f5; overflow: hidden; height: 100vh; font-family: sans-serif; }
        #status { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #fbbc04; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        #excalidraw-mobile-wrapper { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>
    <div id="status">Connecting to Meet...</div>
    <div id="excalidraw-mobile-wrapper"></div>
</body>

    <script type="text/javascript">
        const { useState, useEffect, useRef } = React;
        const urlParams = new URLSearchParams(window.location.search);
        const targetPeerId = urlParams.get('peerId');

        function MobileApp() {
            const [excalidrawAPI, setExcalidrawAPI] = useState(null);
            const isRemoteUpdate = useRef(false);
            const connectionRef = useRef(null);

            useEffect(() => {
                if (targetPeerId) {
                    initPeer();
                } else {
                    document.getElementById('status').innerText = "Error: No Peer ID found.";
                }
            }, []);

            const initPeer = async () => {
                let config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                try {
                    const res = await fetch('/api/get-ice-servers');
                    if (res.ok) config = (await res.json()).config;
                } catch (e) {}

                const peer = new Peer({ config });
                peer.on('open', () => {
                    document.getElementById('status').innerText = "Linking...";
                    const conn = peer.connect(targetPeerId);
                    connectionRef.current = conn;

                    conn.on('open', () => {
                        document.getElementById('status').innerText = "Connected!";
                        document.getElementById('status').style.color = "#34a853";
                    });

                    conn.on('data', (data) => {
                        const msg = JSON.parse(data);
                        if (msg.action === 'scene-update' && excalidrawAPI) {
                            isRemoteUpdate.current = true;
                            excalidrawAPI.updateScene({ elements: msg.elements });
                            setTimeout(() => isRemoteUpdate.current = false, 100);
                        }
                    });
                });
            };

            const onBoardChange = (elements) => {
                if (isRemoteUpdate.current || !connectionRef.current?.open) return;
                connectionRef.current.send(JSON.stringify({ action: 'scene-update', elements }));
            };

            return React.createElement(
                "div", 
                { id: "excalidraw-mobile-wrapper" },
                React.createElement(ExcalidrawLib.Excalidraw, {
                    excalidrawAPI: (api) => setExcalidrawAPI(api),
                    onChange: onBoardChange,
                    UIOptions: {
                        canvasActions: {
                            toggleTheme: false,
                            export: false,
                            loadScene: false,
                            saveToActiveFile: false,
                            changeViewBackgroundColor: false
                        },
                        zoomControls: false
                    }
                })
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('excalidraw-mobile-wrapper'));
        root.render(React.createElement(MobileApp));
    </script>
</html>
