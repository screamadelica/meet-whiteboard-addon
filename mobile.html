<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Canvas Controller</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #333; overflow: hidden; height: 100vh; color: white; font-family: sans-serif; position: relative; }
        #drawing-board { background: white; touch-action: none; display: block; }
        #status { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #fbbc04; z-index: 10; pointer-events: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        /* New Mobile Controls */
        .mobile-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; width: 90%; max-width: 350px; justify-content: space-between; align-items: center; z-index: 10; }
        button { background: #ea4335; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; width: 100%; opacity: 0.9; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        button:active { background: #d93025; }
    </style>
</head>
<body>
    <div id="status">Connecting to Meet...</div>
    
    <canvas id="drawing-board"></canvas>

    <div class="mobile-controls">
        <button id="clear-btn">Clear Board</button>
    </div>

    <script>
        const canvas = document.getElementById('drawing-board');
        const ctx = canvas.getContext('2d');
        let connection = null;
        let isDrawing = false;
        let lastX = 0; let lastY = 0;

        // 1. Get the Meet's Peer ID from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const targetPeerId = urlParams.get('peerId');

        // The "Main Stage" canvas size for coordinate scaling
        const MAIN_WIDTH = 600;
        const MAIN_HEIGHT = 400;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        if (!targetPeerId) {
            document.getElementById('status').innerText = "Error: No Peer ID found in URL.";
        } else {
            // 2. Fetch config and Start PeerJS
            async function initMobile() {
                let peerConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                try {
                    const response = await fetch('/api/get-ice-servers');
                    if (response.ok) {
                        const data = await response.json();
                        peerConfig = data.config;
                    }
                } catch (e) { console.error("ICE fetch error", e); }

                const peer = new Peer({ config: peerConfig });

                peer.on('open', () => {
                document.getElementById('status').innerText = "Linking..." + targetPeerId;
                connection = peer.connect(targetPeerId);
                document.getElementById('status').innerText = "Linked to " + targetPeerId;

                connection.on('open', () => {
                    document.getElementById('status').innerText = "Connected! Start Drawing.";
                    document.getElementById('status').style.color = "#34a853";
                });

                // NEW: Listen for drawing or clearing data FROM the Main Stage
                connection.on('data', (data) => {
                    try {
                        const drawData = JSON.parse(data);
                        if (drawData.action === 'clear') {
                            // Clear the mobile canvas
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                        } else if (drawData.action === 'draw') {
                            // Draw the incoming line on the mobile canvas
                            // Scale from Main Stage dimensions to mobile screen
                            const x0 = (drawData.x0 / MAIN_WIDTH) * canvas.width;
                            const y0 = (drawData.y0 / MAIN_HEIGHT) * canvas.height;
                            const x1 = (drawData.x1 / MAIN_WIDTH) * canvas.width;
                            const y1 = (drawData.y1 / MAIN_HEIGHT) * canvas.height;
                            
                            ctx.beginPath();
                            ctx.moveTo(x0, y0);
                            ctx.lineTo(x1, y1);
                            ctx.strokeStyle = drawData.color;
                            ctx.lineWidth = 4;
                            ctx.lineCap = 'round';
                            ctx.stroke();
                            ctx.closePath();
                        }
                    } catch(e) { console.error("Bad data", e); }
                });
            });
            }
            
            initMobile();
        }

        // 3. Phone Touch Events for Drawing
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.touches[0].clientX - rect.left,
                y: e.touches[0].clientY - rect.top
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const pos = getTouchPos(e);
            lastX = pos.x; lastY = pos.y;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing || !connection || !connection.open) return;
            
            const pos = getTouchPos(e);
            
            // Draw locally on the phone
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = '#4285F4'; // Mobile draws in Blue
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Send to Google Meet Main Stage
            const payload = JSON.stringify({ 
                action: 'draw', 
                // Normalize coordinates to the Main Stage size
                x0: (lastX / canvas.width) * MAIN_WIDTH, 
                y0: (lastY / canvas.height) * MAIN_HEIGHT, 
                x1: (pos.x / canvas.width) * MAIN_WIDTH, 
                y1: (pos.y / canvas.height) * MAIN_HEIGHT, 
                color: '#4285F4' 
            });
            connection.send(payload);

            lastX = pos.x; lastY = pos.y;
        });

        canvas.addEventListener('touchend', () => isDrawing = false);

        // NEW: Mobile Clear Button Logic
        document.getElementById('clear-btn').onclick = () => {
            // 1. Clear the local mobile canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 2. Tell the Google Meet Main Stage to clear its canvas too
            if (connection && connection.open) {
                connection.send(JSON.stringify({ action: 'clear' }));
            }
        };
    </script>
</body>
</html>
