<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Canvas Controller</title>
    
    <!-- Bundled locally to avoid Google Meet CSP restrictions -->
    <script src="/static/excalidraw-bundle.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f0f2f5; overflow: hidden; height: 100vh; font-family: sans-serif; }
        #status { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #fbbc04; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        #excalidraw-mobile-wrapper { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>
    <div id="status">Connecting to Meet...</div>
    <div id="excalidraw-mobile-wrapper"></div>
</body>

    <script type="text/javascript">
        const { useState, useEffect, useRef } = React;
        const urlParams = new URLSearchParams(window.location.search);
        const targetPeerId = urlParams.get('peerId');

        // Custom throttle helper
        window.throttle = (func, limit, { leading, trailing } = { leading: true, trailing: true }) => {
            let timer = null;
            let lastArgs = null;
            return function(...args) {
                lastArgs = args;
                if (timer) return;
                if (leading) func.apply(this, lastArgs);
                timer = setTimeout(() => {
                    if (trailing && !leading) func.apply(this, lastArgs);
                    timer = null;
                }, limit);
            };
        };

        function MobileApp() {
            const excalidrawAPIRef = useRef(null);
            const isRemoteUpdate = useRef(false);
            const versionMapRef = useRef(new Map());
            const connectionRef = useRef(null);
            const [isLibLoaded, setIsLibLoaded] = useState(false);

            useEffect(() => {
                console.log("[Mobile] Starting library polling...");
                let attempts = 0;
                const checkLib = () => {
                    attempts++;
                    const lib = window.ExcalidrawLib || window.Excalidraw;
                    if (lib) {
                        setIsLibLoaded(true);
                    } else if (attempts < 100) {
                        setTimeout(checkLib, 100);
                    } else {
                        console.error("[Mobile] Library polling timeout.");
                    }
                };
                checkLib();
            }, []);

            // Wait for lib before connecting so the API ref is ready
            useEffect(() => {
                if (!isLibLoaded) return;
                if (targetPeerId) {
                    initPeer();
                } else {
                    document.getElementById('status').innerText = "Error: No Peer ID found.";
                }
            }, [isLibLoaded]);

            const initPeer = async () => {
                let config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                try {
                    const res = await fetch('/api/get-ice-servers');
                    if (res.ok) config = (await res.json()).config;
                } catch (e) {}

                const peer = new Peer({ config });
                peer.on('open', () => {
                    document.getElementById('status').innerText = "Linking...";
                    const conn = peer.connect(targetPeerId);
                    connectionRef.current = conn;

                    conn.on('open', () => {
                        document.getElementById('status').innerText = "Connected!";
                        document.getElementById('status').style.color = "#34a853";
                    });

                    conn.on('data', (data) => {
                        const msg = JSON.parse(data);
                        if (msg.action === 'scene-update' && excalidrawAPIRef.current) {
                            const currentElements = excalidrawAPIRef.current.getSceneElements();
                            let nextElements;

                            if (msg.isDiff) {
                                const map = new Map(currentElements.map(e => [e.id, e]));
                                msg.elements.forEach(remoteEl => {
                                    const localEl = map.get(remoteEl.id);
                                    if (!localEl || remoteEl.version > localEl.version) {
                                        map.set(remoteEl.id, remoteEl);
                                    }
                                });
                                nextElements = Array.from(map.values());
                            } else {
                                nextElements = msg.elements;
                            }

                            isRemoteUpdate.current = true;
                            excalidrawAPIRef.current.updateScene({ elements: nextElements });
                            nextElements.forEach(el => versionMapRef.current.set(el.id, el.version));
                            // Short timeout — just enough to skip the echo onChange
                            setTimeout(() => { isRemoteUpdate.current = false; }, 50);
                        }
                    });
                });
            };

            // Send only changed elements (diffs) to improve performance
            const onBoardChange = window.throttle((elements) => {
                if (isRemoteUpdate.current || !connectionRef.current?.open) return;

                const updates = elements.filter(el => el.version > (versionMapRef.current.get(el.id) || -1));
                if (updates.length === 0) return;

                updates.forEach(el => versionMapRef.current.set(el.id, el.version));
                connectionRef.current.send(JSON.stringify({ 
                    action: 'scene-update', 
                    elements: updates, 
                    isDiff: true 
                }));
            }, 50, { leading: true, trailing: true });

            if (!isLibLoaded) {
                return React.createElement("div", { style: { padding: "20px" } }, "Loading Drawing Engine...");
            }

            const lib = window.ExcalidrawLib || window.Excalidraw;
            return React.createElement(
                "div",
                { id: "excalidraw-mobile-wrapper" },
                React.createElement(lib.Excalidraw, {
                    excalidrawAPI: (api) => { excalidrawAPIRef.current = api; },
                    onChange: onBoardChange,
                    UIOptions: {
                        canvasActions: {
                            toggleTheme: false,
                            export: false,
                            loadScene: false,
                            saveToActiveFile: false,
                            changeViewBackgroundColor: false
                        },
                        zoomControls: false
                    }
                })
            );
        }

        // Ensure library is available before mounting React
        const initMobile = () => {
            if (window.React && window.ReactDOM && document.getElementById('excalidraw-mobile-wrapper')) {
                const root = ReactDOM.createRoot(document.getElementById('excalidraw-mobile-wrapper'));
                root.render(React.createElement(MobileApp));
            } else {
                setTimeout(initMobile, 100);
            }
        };

        initMobile();
    </script>
</html>
