<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Canvas Controller</title>
    
    <!-- Bundled locally to avoid Google Meet CSP restrictions -->
    <script src="/static/excalidraw-bundle.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f0f2f5; overflow: hidden; height: 100vh; font-family: sans-serif; }
        #status { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #fbbc04; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        #excalidraw-mobile-wrapper { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>
    <div id="status">Connecting to Meet...</div>
    <div id="excalidraw-mobile-wrapper"></div>
</body>

    <script type="text/javascript">
        const { useState, useEffect, useRef } = React;
        const urlParams = new URLSearchParams(window.location.search);
        const targetPeerId = urlParams.get('peerId');

        // --- DIFF-BASED SYNC ---
        let prevElementMap = {};
        let pendingPatch = {};

        function accumulateDiff(nextElements) {
            const nextMap = {};
            for (const el of nextElements) {
                nextMap[el.id] = el;
                const prev = prevElementMap[el.id];
                if (!prev || prev.version !== el.version || prev.versionNonce !== el.versionNonce) {
                    pendingPatch[el.id] = el;
                }
            }
            for (const id in prevElementMap) {
                if (!nextMap[id]) pendingPatch[id] = { ...prevElementMap[id], isDeleted: true };
            }
            prevElementMap = nextMap;
        }

        function applyPatch(patch, apiRef) {
            if (!apiRef.current) return;
            const current = apiRef.current.getSceneElements();
            const currentMap = {};
            for (const el of current) currentMap[el.id] = el;
            for (const el of patch) {
                if (el.isDeleted) delete currentMap[el.id];
                else currentMap[el.id] = el;
            }
            apiRef.current.updateScene({ elements: Object.values(currentMap) });
        }

        function MobileApp() {
            const excalidrawAPIRef = useRef(null);
            const isRemoteUpdate = useRef(false);
            const connectionRef = useRef(null);
            const [isLibLoaded, setIsLibLoaded] = useState(false);

            useEffect(() => {
                console.log("[Mobile] Starting library polling...");
                let attempts = 0;
                const checkLib = () => {
                    attempts++;
                    const lib = window.ExcalidrawLib || window.Excalidraw;
                    if (lib) {
                        setIsLibLoaded(true);
                    } else if (attempts < 100) {
                        setTimeout(checkLib, 100);
                    } else {
                        console.error("[Mobile] Library polling timeout.");
                    }
                };
                checkLib();
            }, []);

            useEffect(() => {
                if (!isLibLoaded) return;
                if (targetPeerId) {
                    initPeer();
                } else {
                    document.getElementById('status').innerText = "Error: No Peer ID found.";
                }
            }, [isLibLoaded]);

            const initPeer = async () => {
                let config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                try {
                    const res = await fetch('/api/get-ice-servers');
                    if (res.ok) config = (await res.json()).config;
                } catch (e) {}

                const peer = new Peer({ config });
                peer.on('open', () => {
                    document.getElementById('status').innerText = "Linking...";
                    const conn = peer.connect(targetPeerId);
                    connectionRef.current = conn;

                    conn.on('open', () => {
                        document.getElementById('status').innerText = "Connected!";
                        document.getElementById('status').style.color = "#34a853";
                    });

                    conn.on('data', (data) => {
                        const msg = JSON.parse(data);
                        if (msg.action === 'scene-update' && excalidrawAPIRef.current) {
                            // Full snapshot — replace entire scene and reset diff tracking
                            isRemoteUpdate.current = true;
                            excalidrawAPIRef.current.updateScene({ elements: msg.elements });
                            prevElementMap = {};
                            pendingPatch = {};
                            setTimeout(() => isRemoteUpdate.current = false, 150);
                        } else if (msg.action === 'patch-update' && excalidrawAPIRef.current) {
                            // Incremental patch — merge only changed elements
                            isRemoteUpdate.current = true;
                            applyPatch(msg.patch, excalidrawAPIRef);
                            setTimeout(() => isRemoteUpdate.current = false, 150);
                        }
                    });
                });
            };

            // onChange: accumulate diff on EVERY call (unthrottled), send on throttle
            const flushPatch = window.throttle(() => {
                if (isRemoteUpdate.current || !connectionRef.current?.open) return;
                const patch = Object.values(pendingPatch);
                pendingPatch = {};
                if (patch.length === 0) return;
                connectionRef.current.send(JSON.stringify({ action: 'patch-update', patch }));
            }, 150, { leading: true, trailing: true });

            const onBoardChange = (elements) => {
                if (isRemoteUpdate.current) return;
                accumulateDiff(elements); // always track — never skip
                flushPatch();             // send at most every 150ms
            };

            if (!isLibLoaded) {
                return React.createElement("div", { style: { padding: "20px" } }, "Loading Drawing Engine...");
            }

            const lib = window.ExcalidrawLib || window.Excalidraw;
            return React.createElement(
                "div",
                { id: "excalidraw-mobile-wrapper" },
                React.createElement(lib.Excalidraw, {
                    excalidrawAPI: (api) => { excalidrawAPIRef.current = api; },
                    onChange: onBoardChange,
                    UIOptions: {
                        canvasActions: {
                            toggleTheme: false,
                            export: false,
                            loadScene: false,
                            saveToActiveFile: false,
                            changeViewBackgroundColor: false
                        },
                        zoomControls: false
                    }
                })
            );
        }

        // Ensure library is available before mounting React
        const initMobile = () => {
            if (window.React && window.ReactDOM && document.getElementById('excalidraw-mobile-wrapper')) {
                const root = ReactDOM.createRoot(document.getElementById('excalidraw-mobile-wrapper'));
                root.render(React.createElement(MobileApp));
            } else {
                setTimeout(initMobile, 100);
            }
        };

        initMobile();
    </script>
</html>
